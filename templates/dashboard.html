<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Dashboard Analisis PBD</title>

<style>

body{
font-family:Segoe UI;
background:#f4f6f9;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:25px;
}

/* TAB BUTTON */

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab-btn{
flex:1;
padding:12px;
border:none;
border-radius:6px;
background:#ecf0f1;
cursor:pointer;
font-weight:600;
}

.tab-btn.active{
background:#3498db;
color:white;
}

/* TAB CONTENT */

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

.list{
margin-top:10px;
}

.teacher{
padding:10px;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<div class="container">

<h1>Dashboard Analisis PBD</h1>

<div class="tabs">
<button class="tab-btn active" onclick="openTab('A',this)">Lampiran A</button>
<button class="tab-btn" onclick="openTab('B',this)">Lampiran B</button>
<button class="tab-btn" onclick="openTab('C',this)">Lampiran C</button>
</div>

<div id="tabA" class="tab-content active">
<h3>Lampiran A</h3>
<div id="listA" class="list"></div>
</div>

<div id="tabB" class="tab-content">
<h3>Lampiran B</h3>
<div id="listB" class="list"></div>
</div>

<div id="tabC" class="tab-content">
<h3>Lampiran C</h3>
<div id="listC" class="list"></div>
</div>

</div>

<script>

/* TAB SWITCH */

function openTab(tab,btn){

document.querySelectorAll(".tab-content")
.forEach(t => t.classList.remove("active"));

document.querySelectorAll(".tab-btn")
.forEach(b => b.classList.remove("active"));

document.getElementById("tab"+tab).classList.add("active");
btn.classList.add("active");

}

/* GOOGLE SHEET */

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8Tl5sDCaVKwe35rLITcvOHnLTTzfCDRxEKXE1fN4unnQyXSRKTbo4vT9OtussZJyOIFEP1bhF5M6j/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

const rows = data.split("\n").slice(1);

const listC = document.getElementById("listC");

rows.forEach(row => {

const cols = row.split(",");

const nama = cols[1];

if(nama){

const div = document.createElement("div");
div.className = "teacher";
div.innerText = nama;

listC.appendChild(div);

}

});

});

</script>

</body>
</html>
