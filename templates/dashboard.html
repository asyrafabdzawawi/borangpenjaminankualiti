<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Dashboard Analisis</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f4f6f9;
padding:40px;
}

.chart-box{
width:300px;
margin:auto;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:25px;
}

/* TAB BUTTON */

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab-btn{
flex:1;
padding:12px;
border:none;
border-radius:6px;
background:#ecf0f1;
cursor:pointer;
font-weight:600;
}

.tab-btn.active{
background:#3498db;
color:white;
}

/* TAB CONTENT */

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

.list{
margin-top:10px;
}

.teacher{
padding:10px;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<div class="container">

<h1>Dashboard Analisis</h1>

<div class="tabs">
<button class="tab-btn active" onclick="openTab('A',this)">Lampiran A</button>
<button class="tab-btn" onclick="openTab('B',this)">Lampiran B</button>
<button class="tab-btn" onclick="openTab('C',this)">Lampiran C</button>
</div>

<div id="tabA" class="tab-content active">
<h3>Lampiran A</h3>
<div id="listA" class="list"></div>
</div>

<div id="tabB" class="tab-content">
<h3>Lampiran B</h3>
<div id="listB" class="list"></div>
</div>

<div id="tabC" class="tab-content">
<h3>Lampiran C</h3>
<p id="jumlahC"><b>Jumlah respon: 0 guru</b></p>


<h3>1. Pengurusan Penjaminan Kualiti</h3>
<p>1.1 Merujuk Panduan Pelaksanaan Pentaksiran Bilik Darjah</p>

<div class="chart-box">
<canvas id="chart11"></canvas>
</div>

<h3>2. Pementoran</h3>
<p>2.1 Menerima bimbingan daripada GKMP/KP</p>

<div class="chart-box">
<canvas id="chart21"></canvas>
</div>
</div>

</div>

<script>

/* TAB SWITCH */

function openTab(tab,btn){

document.querySelectorAll(".tab-content")
.forEach(t => t.classList.remove("active"));

document.querySelectorAll(".tab-btn")
.forEach(b => b.classList.remove("active"));

document.getElementById("tab"+tab).classList.add("active");
btn.classList.add("active");

}

/* GOOGLE SHEET */

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8Tl5sDCaVKwe35rLITcvOHnLTTzfCDRxEKXE1fN4unnQyXSRKTbo4vT9OtussZJyOIFEP1bhF5M6j/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

const rows = data.split("\n").slice(1);

const jumlahC = document.getElementById("jumlahC");

let count = 0;
let ya = 0;
let tidak = 0;

let s1 = 0;
let s2 = 0;
let s3 = 0;
let s4 = 0;
let s5 = 0;

rows.forEach(row => {

const cols = row.split(",");

const nama = cols[1];
const q11 = cols[5];
const q21 = cols[6];

if(nama && nama.trim() !== ""){
count++;
}

if(q11 === "Ya") ya++;
if(q11 === "Tidak") tidak++;

if(q21 === "1") s1++;
if(q21 === "2") s2++;
if(q21 === "3") s3++;
if(q21 === "4") s4++;
if(q21 === "5") s5++;

});

jumlahC.innerHTML = "<b>Jumlah respon: " + count + " guru</b>";

/* PIE CHART 1.1 */

const ctx = document.getElementById('chart11');

new Chart(ctx, {
type: 'pie',
data: {
labels: ['Ya', 'Tidak'],
datasets: [{
data: [ya, tidak],
backgroundColor: ['#2ecc71','#e74c3c']
}]
},
options: {
plugins: {
legend: {
position: 'bottom'
}
}
}
});

/* BAR CHART 2.1 */

const ctx21 = document.getElementById('chart21');

new Chart(ctx21, {
type: 'bar',
data: {
labels: ['1','2','3','4','5'],
datasets: [{
label: 'Bilangan Guru',
data: [s1, s2, s3, s4, s5],
backgroundColor: '#3498db'
}]
},
options: {
plugins:{
legend:{display:false}
},
scales:{
y:{
beginAtZero:true
}
}
}
});

});

</script>

</body>
</html>
